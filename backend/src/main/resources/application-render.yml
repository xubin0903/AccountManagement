# Render 免费部署环境配置 — H2 MySQL 兼容模式
server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:h2:file:./data/account_management;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

logging:
  level:
    com.example.accountmanagement: debug
