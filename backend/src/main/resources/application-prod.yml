# ECS 生产环境配置 — 连接主机 MySQL
server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/account_management?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.accountmanagement.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.example.accountmanagement: info
