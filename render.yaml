# Render Infrastructure as Code
# 文档: https://render.com/docs/infrastructure-as-code
services:
  - type: web
    name: account-management-api
    runtime: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /users
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
